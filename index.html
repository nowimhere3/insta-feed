<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insta-Feed Omnivore Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        #feed-container {
            width: 100%;
            max-width: 500px;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .feed-item {
            background: #121212;
            border: 1px solid #262626;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .media-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-wrapper img, .media-wrapper video {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
        }
        .item-footer {
            padding: 12px;
            font-size: 12px;
            color: #a8a8a8;
            border-top: 1px solid #262626;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #262626;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="feed-container">Loading your media vault...</div>

    <div id="controls">
        <strong>Hotkeys:</strong><br>
        [Space] Play/Pause Video<br>
        [S] Shuffle Items
    </div>

    <script>
        // ==========================================
        //  CONFIG: UPDATE WITH YOUR QUICK TUNNEL URL
        // ==========================================
        const TUNNEL_URL = 'const TUNNEL_URL = 'https://beatles-fancy-struggle-rich.trycloudflare.com';';

        let allMedia = [];

        // 1. Fetch live structure from local python engine
        async function loadFeed() {
            try {
                const response = await fetch(`${TUNNEL_URL}/api/media`);
                allMedia = await response.json();
                shuffleAndRender();
            } catch (err) {
                document.getElementById('feed-container').innerHTML = `Connection Error: ${err.message}`;
            }
        }

        // 2. Shuffle array across all master/sub-folders
        function shuffleAndRender() {
            let shuffled = [...allMedia].sort(() => 0.5 - Math.random());
            const container = document.getElementById('feed-container');
            container.innerHTML = '';

            shuffled.forEach((item, index) => {
                // Convert tunnel route properly
                const finalUrl = item.url.replace('http://localhost:8000', TUNNEL_URL);
                
                const card = document.createElement('div');
                card.className = 'feed-item';

                const wrapper = document.createElement('div');
                wrapper.className = 'media-wrapper';

                // Core Format Router
                if (['jpg', 'jpeg', 'png', 'gif'].includes(item.type)) {
                    // Images and GIFs
                    const img = document.createElement('img');
                    img.src = finalUrl;
                    img.loading = 'lazy';
                    wrapper.appendChild(img);
                } else if (['mp4', 'webm'].includes(item.type)) {
                    // Native Web Videos
                    const video = document.createElement('video');
                    video.src = finalUrl;
                    video.loop = true;
                    video.muted = true;
                    video.setAttribute('playsinline', '');
                    video.autoplay = true;
                    wrapper.appendChild(video);
                } else if (item.type === 'ts') {
                    // Raw Broadcast Streams via mpegts.js engine
                    const video = document.createElement('video');
                    video.loop = true;
                    video.muted = true;
                    video.setAttribute('playsinline', '');
                    wrapper.appendChild(video);

                    if (mpegts.getFeatureList().mseLivePlayback) {
                        const player = mpegts.createPlayer({
                            type: 'mpegts',
                            url: finalUrl,
                            isLive: false
                        });
                        player.attachMediaElement(video);
                        player.load();
                        player.play();
                    }
                }

                const footer = document.createElement('div');
                footer.className = 'item-footer';
                footer.innerText = `Format: .${item.type.toUpperCase()} | Asset #${index + 1}`;

                card.appendChild(wrapper);
                card.appendChild(footer);
                container.appendChild(card);
            });
        }

        // 3. Global Hotkeys Handling
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyS') {
                shuffleAndRender();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
            if (e.code === 'Space') {
                e.preventDefault();
                // Find all videos currently visible or playing and toggle them
                document.querySelectorAll('video').forEach(vid => {
                    if (vid.paused) vid.play(); else vid.pause();
                });
            }
        });

        // Initialize App
        loadFeed();
    </script>
</body>
</html>
